name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Infra/**'
      - '!Infra/envs/*.tfvars'       

permissions:
  id-token: write       
  contents: write       
  pull-requests: write  

env:
  TF_VERSION: "1.10.3"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}   
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: Infra/.terraform
          key: terraform-${{ hashFiles('Infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Format Check
        working-directory: Infra
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init
        working-directory: Infra
        run: |
          terraform init -reconfigure -backend-config="key=quran-app/dev/terraform.tfstate"

      - name: Terraform Validate
        working-directory: Infra
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        working-directory: Infra
        run: |
          tflint --init
          tflint --recursive || true

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: Infra/
          severity: CRITICAL,HIGH
          exit-code: 0      
          format: table

      - name: Generate terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: |
            Infra
            Infra/vpc
            Infra/ecs
            Infra/ecr
            Infra/alb
            Infra/acm
            Infra/s3
            Infra/iam
            Infra/cloudfront
            Infra/cloudwatch
            Infra/security_groups
            Infra/cloudflare
            bootstrap
          output-file: README.md
          output-method: inject
          git-push: true
          git-commit-message: "docs: auto-generate terraform-docs README [skip ci]"

      - name: Terraform Plan
        working-directory: Infra
        id: plan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform plan \
            -var-file=envs/dev.tfvars \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: Infra/tfplan
          retention-days: 5

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('Infra/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... output truncated'
              : planOutput;

            const output = `## Terraform Plan

            <details>
            <summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            **Plan Status:** \`${{ steps.plan.outcome }}\`
            **Triggered by:** @${{ github.actor }}
            **Commit:** \`${{ github.sha }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1