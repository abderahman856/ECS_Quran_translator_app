name: Docker Build & Push

on:
  push:
    branches:
      - main
    paths:
      - 'app/backend/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: quran-app-backend

jobs:
  build-and-push:
    name: Build & Push (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="$SHORT_SHA"
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_uri=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "📦 Image tag: $IMAGE_TAG"
          echo "🔗 Image URI: $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          file: app/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS service with new image
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          CLUSTER="quran-app-${ENV}-cluster"
          SERVICE="quran-app-service"
          IMAGE_URI="${{ steps.meta.outputs.image_uri }}"

          echo "Deploying $IMAGE_URI to ECS $CLUSTER/$SERVICE"

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition quran-app-task \
            --query 'taskDefinition' \
            --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $NEW_TASK_ARN"

          # Update ECS service
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TASK_ARN" \
            --no-cli-pager

          echo "ECS service updated — new deployment in progress"

      - name: Wait for ECS deployment to stabilize
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          CLUSTER="quran-app-${ENV}-cluster"
          SERVICE="quran-app-service"

          echo "⏳ Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
          echo "ECS deployment complete"

      - name: Backend health check
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          if [ "$ENV" == "prod" ]; then
            HEALTH_URL="https://api.baashe.uk/health"
          else
            HEALTH_URL="https://api.dev.baashe.uk/health"
          fi

          echo "🔍 Checking backend health at $HEALTH_URL"

          # Retry up to 5 times with 15s delay — CloudFront/ALB may need a moment
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"

            if [ "$STATUS" == "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi

            echo "⏳ Not ready yet, retrying in 15s..."
            sleep 15
          done

          echo "Backend health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          if [ "$ENV" == "prod" ]; then
            HEALTH_URL="https://api.baashe.uk/health"
          else
            HEALTH_URL="https://api.dev.baashe.uk/health"
          fi

          echo "## 🚀 Docker Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.meta.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image URI | ${{ steps.meta.outputs.image_uri }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | $HEALTH_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY