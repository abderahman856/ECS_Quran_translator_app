name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'Infra/**'
      - '!Infra/envs/*.tfvars'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Type "apply" to confirm deployment'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.3"

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Validate confirmation for prod
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "apply" ]; then
            echo "You must type 'apply' to confirm prod deployment"
            exit 1
          fi

  terraform-apply:
    name: Terraform Apply (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup

    environment: ${{ needs.setup.outputs.environment == 'prod' && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: Infra/.terraform
          key: terraform-${{ hashFiles('Infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Terraform Init
        working-directory: Infra
        run: |
          terraform init -reconfigure \
            -backend-config="key=quran-app/${{ needs.setup.outputs.environment }}/terraform.tfstate"

      - name: Create tfvars file
        working-directory: Infra
        run: |
          ENV="${{ needs.setup.outputs.environment }}"

          if [ "$ENV" == "prod" ]; then
            cat > envs/prod.tfvars << EOF
          environment                     = "prod"
          project_name                    = "quran-app"
          aws_region                      = "${{ secrets.AWS_REGION }}"
          domain_name                     = "${{ secrets.PROD_DOMAIN_NAME }}"
          cloudflare_zone_id              = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          cloudflare_api_token            = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          container_image                 = "${{ secrets.PROD_CONTAINER_IMAGE }}"
          vpc_cidr                        = "10.2.0.0/16"
          private_subnet_cidrs            = ["10.2.10.0/24", "10.2.11.0/24"]
          public_subnet_cidrs             = ["10.2.0.0/24", "10.2.1.0/24"]
          availability_zones              = ["us-east-1a", "us-east-1b"]
          image_tag_mutability            = "IMMUTABLE"
          untainted_image_retention_count = 5
          log_retention_days              = 30
          bucket_name                     = "frontend"
          EOF
          else
            cat > envs/dev.tfvars << EOF
          environment                     = "dev"
          project_name                    = "quran-app"
          aws_region                      = "${{ secrets.AWS_REGION }}"
          domain_name                     = "${{ secrets.DEV_DOMAIN_NAME }}"
          cloudflare_zone_id              = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          cloudflare_api_token            = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          container_image                 = "${{ secrets.DEV_CONTAINER_IMAGE }}"
          vpc_cidr                        = "10.0.0.0/16"
          private_subnet_cidrs            = ["10.0.10.0/24", "10.0.11.0/24"]
          public_subnet_cidrs             = ["10.0.0.0/24", "10.0.1.0/24"]
          availability_zones              = ["us-east-1a", "us-east-1b"]
          image_tag_mutability            = "MUTABLE"
          untainted_image_retention_count = 3
          log_retention_days              = 7
          bucket_name                     = "frontend"
          EOF
          fi

      - name: Terraform Plan
        working-directory: Infra
        run: |
          set +e
          terraform plan \
            -var-file=envs/${{ needs.setup.outputs.environment }}.tfvars \
            -no-color \
            -out=tfplan
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            echo "Terraform plan failed with error"
            exit 1
          fi
          exit 0

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: Infra/tfplan
          retention-days: 1

      - name: Terraform Apply
        working-directory: Infra
        run: terraform apply tfplan -no-color

      - name: Terraform Output
        working-directory: Infra
        run: terraform output -no-color
        continue-on-error: true