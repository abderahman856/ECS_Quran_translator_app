# .github/workflows/terraform-destroy-apply.yml
# Manual trigger only — actually destroys infrastructure
# ALWAYS run terraform-destroy-plan.yml first to review what will be destroyed

name: Terraform Destroy Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Type "destroy" to confirm — THIS CANNOT BE UNDONE'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.3"

jobs:
  destroy:
    name: Terraform Destroy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

    steps:
      # ── 0. Validate confirmation ──────────────────────────────────────────
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ You must type 'destroy' to confirm. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted"

      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS via OIDC ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Setup Terraform ────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # ── 4. Cache Terraform providers ──────────────────────────────────────
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: Infra/.terraform
          key: terraform-${{ hashFiles('Infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      # ── 5. Terraform Init — separate state per environment ────────────────
      - name: Terraform Init
        working-directory: Infra
        run: |
          terraform init -reconfigure \
            -backend-config="key=quran-app/${{ github.event.inputs.environment }}/terraform.tfstate"

      # ── 6. Create tfvars file from secrets ────────────────────────────────
      - name: Create tfvars file
        working-directory: Infra
        run: |
          ENV="${{ github.event.inputs.environment }}"

          if [ "$ENV" == "prod" ]; then
            cat > envs/prod.tfvars << EOF
          environment                     = "prod"
          project_name                    = "quran-app"
          aws_region                      = "${{ secrets.AWS_REGION }}"
          domain_name                     = "${{ secrets.PROD_DOMAIN_NAME }}"
          cloudflare_zone_id              = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          cloudflare_api_token            = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          container_image                 = "${{ secrets.PROD_CONTAINER_IMAGE }}"
          vpc_cidr                        = "10.2.0.0/16"
          private_subnet_cidrs            = ["10.2.10.0/24", "10.2.11.0/24"]
          public_subnet_cidrs             = ["10.2.0.0/24", "10.2.1.0/24"]
          availability_zones              = ["us-east-1a", "us-east-1b"]
          image_tag_mutability            = "IMMUTABLE"
          untainted_image_retention_count = 5
          log_retention_days              = 30
          bucket_name                     = "frontend"
          EOF
          else
            cat > envs/dev.tfvars << EOF
          environment                     = "dev"
          project_name                    = "quran-app"
          aws_region                      = "${{ secrets.AWS_REGION }}"
          domain_name                     = "${{ secrets.DEV_DOMAIN_NAME }}"
          cloudflare_zone_id              = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          cloudflare_api_token            = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          container_image                 = "${{ secrets.DEV_CONTAINER_IMAGE }}"
          vpc_cidr                        = "10.0.0.0/16"
          private_subnet_cidrs            = ["10.0.10.0/24", "10.0.11.0/24"]
          public_subnet_cidrs             = ["10.0.0.0/24", "10.0.1.0/24"]
          availability_zones              = ["us-east-1a", "us-east-1b"]
          image_tag_mutability            = "MUTABLE"
          untainted_image_retention_count = 3
          log_retention_days              = 7
          bucket_name                     = "frontend"
          EOF
          fi

      # ── 7. Empty S3 buckets before destroy ────────────────────────────────
      - name: Empty S3 buckets
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "🗑️ Emptying S3 buckets for $ENV..."

          for BUCKET in \
            "quran-app-${ENV}-frontend" \
            "quran-app-${ENV}-frontend-logs" \
            "quran-app-${ENV}-cf-logs"; do

            echo "--- Emptying s3://$BUCKET ---"

            aws s3 rm s3://$BUCKET --recursive 2>/dev/null \
              && echo "Objects deleted" \
              || echo "Bucket $BUCKET not found or already empty, skipping"

            VERSIONS=$(aws s3api list-object-versions \
              --bucket $BUCKET \
              --query 'Versions[].{Key:Key,VersionId:VersionId}' \
              --output json 2>/dev/null || echo "[]")

            if [ "$VERSIONS" != "[]" ] && [ -n "$VERSIONS" ]; then
              echo "$VERSIONS" | jq '{Objects: .}' | \
                aws s3api delete-objects --bucket $BUCKET --delete file:///dev/stdin 2>/dev/null || true
              echo "Versioned objects deleted"
            fi

            MARKERS=$(aws s3api list-object-versions \
              --bucket $BUCKET \
              --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
              --output json 2>/dev/null || echo "[]")

            if [ "$MARKERS" != "[]" ] && [ -n "$MARKERS" ]; then
              echo "$MARKERS" | jq '{Objects: .}' | \
                aws s3api delete-objects --bucket $BUCKET --delete file:///dev/stdin 2>/dev/null || true
              echo "Delete markers removed"
            fi

          done

          echo "✅ All S3 buckets emptied"

      # ── 8. Empty ECR repository ───────────────────────────────────────────
      - name: Empty ECR repository
        run: |
          REPO="quran-app-backend"
          echo "🗑️ Deleting all images from ECR $REPO..."

          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $REPO \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")

          if [ "$IMAGE_IDS" != "[]" ] && [ -n "$IMAGE_IDS" ]; then
            aws ecr batch-delete-image \
              --repository-name $REPO \
              --image-ids "$IMAGE_IDS"
            echo "✅ ECR images deleted"
          else
            echo "ECR already empty or not found"
          fi

      # ── 9. Terraform Destroy ──────────────────────────────────────────────
      - name: Terraform Destroy
        working-directory: Infra
        run: |
          terraform destroy \
            -var-file=envs/${{ github.event.inputs.environment }}.tfvars \
            -no-color \
            -auto-approve

      # ── 10. Summary ───────────────────────────────────────────────────────
      - name: Destroy summary
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "## 💥 Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | All resources destroyed ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY