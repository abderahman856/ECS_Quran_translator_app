name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/frontend/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy Frontend (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Set environment config
        id: config
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          if [ "$ENV" == "prod" ]; then
            echo "vite_api_url=https://api.baashe.uk" >> $GITHUB_OUTPUT
            echo "s3_bucket=quran-app-prod-frontend" >> $GITHUB_OUTPUT
            echo "cloudfront_id=${{ secrets.PROD_CLOUDFRONT_ID }}" >> $GITHUB_OUTPUT
            echo "frontend_url=https://baashe.uk" >> $GITHUB_OUTPUT
          else
            echo "vite_api_url=https://api.dev.baashe.uk" >> $GITHUB_OUTPUT
            echo "s3_bucket=quran-app-dev-frontend" >> $GITHUB_OUTPUT
            echo "cloudfront_id=${{ secrets.DEV_CLOUDFRONT_ID }}" >> $GITHUB_OUTPUT
            echo "frontend_url=https://dev.baashe.uk" >> $GITHUB_OUTPUT
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: app/frontend
        env:
          VITE_API_URL: ${{ steps.config.outputs.vite_api_url }}
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync app/frontend/dist s3://${{ steps.config.outputs.s3_bucket }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html should never be cached
          aws s3 cp app/frontend/dist/index.html s3://${{ steps.config.outputs.s3_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "Synced to s3://${{ steps.config.outputs.s3_bucket }}"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.config.outputs.cloudfront_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "CloudFront invalidation created: $INVALIDATION_ID"
          echo "⏳ Waiting 20s for invalidation to propagate..."
          sleep 20

      - name: Frontend health check
        run: |
          FRONTEND_URL="${{ steps.config.outputs.frontend_url }}"

          echo "🔍 Checking frontend at $FRONTEND_URL"

          # Retry up to 5 times with 15s delay
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"

            if [ "$STATUS" == "200" ]; then
              echo "Frontend is live!"
              exit 0
            fi

            echo "Not ready yet, retrying in 15s..."
            sleep 15
          done

          echo "Frontend health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        run: |
          ENV="${{ steps.config.outputs.environment }}"
          echo "## Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ steps.config.outputs.s3_bucket }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API URL | ${{ steps.config.outputs.vite_api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend URL | ${{ steps.config.outputs.frontend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront ID | ${{ steps.config.outputs.cloudfront_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY