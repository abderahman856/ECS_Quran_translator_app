exclude: |
  (?x)^(
    .*node_modules/.*|
    .*dist/.*|
    .*build/.*|
    .*\.min\.js$|
    .*\.min\.css$
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-yaml
        name: Validate YAML files
      - id: check-json
        name: Validate JSON files
      - id: detect-private-key
        name: Detect private keys
      - id: no-commit-to-branch
        name: Prevent commits to main
        args: [--branch, main]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.104.0
    hooks:
      - id: terraform_fmt
        name: Format Terraform files
        description: Runs terraform fmt to enforce consistent formatting

      - id: terraform_validate
        name: Validate Terraform configuration
        description: Runs terraform validate to catch syntax and config errors

      - id: terraform_tflint
        name: Lint Terraform files
        description: Runs tflint to catch potential issues and bad practices

      - id: terraform_docs
        name: Generate Terraform docs
        args:
          - --args=--output-file=README.md
          - --args=--output-mode=replace
        description: Auto-generates README.md for each module with inputs and outputs

      - id: terraform_trivy
        name: Security scan
        description: Runs trivy to scan for security misconfigurations in your Terraform code

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Runs hadolint to lint Dockerfiles

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format frontend code
        files: ^quran_translator_app/frontend/.*\.(js|jsx|ts|tsx|css|html)$
        additional_dependencies:
          - prettier@3.3.3

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.1
    hooks:
      - id: eslint
        name: Lint frontend JS/JSX
        files: ^quran_translator_app/frontend/.*\.(js|jsx)$
        additional_dependencies:
          - eslint@9.9.1
          - eslint-plugin-react@7.35.0
          - eslint-plugin-react-hooks@4.6.2

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format backend code
        files: ^quran_translator_app/backend/.*\.(js|json)$
        additional_dependencies:
          - prettier@3.3.3

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.1
    hooks:
      - id: eslint
        name: Lint backend JS
        files: ^quran_translator_app/backend/.*\.js$
        additional_dependencies:
          - eslint@9.9.1
