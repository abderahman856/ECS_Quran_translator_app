services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:8080"
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - QURAN_API_BASE_URL=${QURAN_API_BASE_URL}
    ports:
      - "${EXTERNAL_BACKEND_PORT}:${BACKEND_PORT}"
    develop:
      watch:
        - action: rebuild
          path: ./backend/src
        - action: rebuild
          path: ./backend/package.json
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
